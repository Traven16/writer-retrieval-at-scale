extends:
  - ../_base/cm1_data.yaml
  - ../_base/xvlad_resnet18.yaml
  - ../_base/arcface_triplet.yaml
  - ../_base/runtime.yaml

defaults:
  run:
    results_dir: "${PATCHFORMER_OUTPUT_ROOT:-outputs}/results/cm1_xvlad_ablations"
    log_dir: "${PATCHFORMER_OUTPUT_ROOT:-outputs}/runs/cm1_xvlad_ablations/{run_name}"
    save_path: "${PATCHFORMER_CHECKPOINT_ROOT:-outputs/checkpoints}/cm1_xvlad_ablations/{run_name}.pt"

experiments:
  - name: ablate_heads_1
    overrides:
      model:
        nhead: 1
        d_model: 64

  - name: ablate_heads_4
    overrides:
      model:
        nhead: 4
        d_model: 256

  - name: ablate_heads_8
    overrides:
      model:
        nhead: 8
        d_model: 512

  - name: ablate_heads_32
    overrides:
      model:
        nhead: 32
        d_model: 2048

